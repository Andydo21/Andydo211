<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="text-center mb-4">
                    <h4><span style="font-size: 0.7em">ADMIN</span></h4>
                </div>
                <a href="admin-home.html"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#movieMenu" role="button" aria-expanded="true" aria-controls="movieMenu">
                    <span><i class="fas fa-film"></i> Phim</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="movieMenu">
                    <a class="nav-link submenu" href="admin-movie.html">Danh sách phim</a>
                    <a class="nav-link submenu" href="admin-movie-add.html">Thêm phim</a>
                    <a class="nav-link submenu" href="admin-movie-update.html">Sửa phim</a>
                </div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#userMenu" role="button" aria-expanded="true" aria-controls="userMenu">
                    <span><i class="bi bi-person-fill"></i> User</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="userMenu">
                    <a class="nav-link submenu" href="admin-user.html">Danh sách user</a>
                    <a class="nav-link submenu" href="admin-user-update.html">Tạo user</a>
                </div>
                <a href="#"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Trang quản trị</h2>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Tổng số phim</h5>
                                <p class="card-text fs-3" id="movieCount">--</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Tổng số user</h5>
                                <p class="card-text fs-3" id="userCount">--</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-warning mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Thể loại</h5>
                                <p class="card-text fs-3" id="categoryCount">--</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">Thống kê gần đây</div>
                    <div class="card-body">
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch("http://localhost:8080/api/products/count")
                .then(res => res.json())
                .then(data => document.getElementById("movieCount").textContent = data);

            fetch("http://localhost:8080/api/users/count")
                .then(res => res.json())
                .then(data => document.getElementById("userCount").textContent = data);

            fetch("http://localhost:8080/api/categories/count")
                .then(res => res.json())
                .then(data => document.getElementById("categoryCount").textContent = data);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
