<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Danh sách phim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="text-center mb-4">
                    <h4><span style="font-size: 0.7em">ADMIN</span></h4>
                </div>
                <a href="admin-home.html"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#movieMenu" role="button" aria-expanded="true" aria-controls="movieMenu">
                    <span><i class="fas fa-film"></i> Phim</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="movieMenu">
                    <a class="nav-link submenu active" href="admin-movie.html">Danh sách phim</a>
                    <a class="nav-link submenu" href="admin-movie-add.html">Thêm phim</a>
                    <a class="nav-link submenu" href="admin-movie-update.html">Sửa phim</a>
                </div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#userMenu" role="button" aria-expanded="true" aria-controls="userMenu">
                    <span><i class="bi bi-person-fill"></i> User</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="userMenu">
                    <a class="nav-link submenu" href="admin-user.html">Danh sách user</a>
                    <a class="nav-link submenu" href="admin-user-update.html">Tạo user</a>
                </div>
                <a href="#"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Danh sách phim</h2>
                    <a href="admin-movie-add.html" class="btn btn-primary">+ Thêm phim</a>
                </div>

                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Poster</th>
                            <th>Tên phim</th>
                            <th>Thể loại</th>
                            <th>Năm</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="movie-table-body">

                    </tbody>
                </table>
            </main>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadMovies();
        });

        function loadMovies() {
            fetch("http://localhost:8080/api/products")
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById("movie-table-body");
                    tbody.innerHTML = "";

                    data.forEach((movie, index) => {
                        tbody.innerHTML += `
              <tr>
                <td>${index + 1}</td>
                <td><img src="${movie.imageUrl}" width="60" class="img-thumbnail" /></td>
                <td>${movie.productName}</td>
                <td>${movie.categoryID}</td>
                <td>${movie.price}đ</td>
                <td>
                  <a href="admin-movie-update.html?id=${movie.id}" class="btn btn-sm btn-warning">
                    <i class="fas fa-edit"></i>
                  </a>
                  <button class="btn btn-sm btn-danger" onclick="deleteMovie(${movie.id})">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </td>
              </tr>
            `;
                    });
                });
        }

        function deleteMovie(id) {
            if (confirm("Bạn có chắc chắn muốn xóa phim này không?")) {
                fetch(`http://localhost:8080/api/products/${id}`, {
                    method: "DELETE"
                })
                    .then(res => {
                        if (res.ok) {
                            alert("Xóa phim thành công!");
                            loadMovies();
                        } else {
                            alert("Xóa thất bại!");
                        }
                    })
                    .catch(err => {
                        console.error("Lỗi:", err);
                        alert("Lỗi kết nối đến server!");
                    });
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
