<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Cập nhật tập phim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar">
      <div class="text-center mb-4">
        <h4><span style="font-size: 0.7em">ADMIN</span></h4>
      </div>
      <a th:href="@{/admin/home}"><i class="bi bi-clipboard-data-fill"></i> Bảng điều khiển</a>
      <a class="nav-link d-flex justify-content-between align-items-center"
         data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
         aria-controls="movieMenu">
        <span><i class="fas fa-film"></i> Phim</span>
        <i class="fas fa-chevron-down nav-toggle-icon"></i>
      </a>
      <div class="collapse show" id="movieMenu">
        <a class="nav-link submenu" th:href="@{/admin/movie}">Danh sách phim</a>
        <a class="nav-link submenu" th:href="@{/admin/movie/add}">Thêm phim</a>
        <a class="nav-link submenu" th:href="@{/admin/movie/update}">Cập nhật phim</a>
      </div>
      <a class="nav-link d-flex justify-content-between align-items-center"
         data-bs-toggle="collapse" href="#userMenu" role="button" aria-expanded="true"
         aria-controls="userMenu">
        <span><i class="bi bi-person-fill"></i> Người dùng</span>
        <i class="fas fa-chevron-down nav-toggle-icon"></i>
      </a>
      <div class="collapse show" id="userMenu">
        <a class="nav-link submenu" th:href="@{/admin/user}">Danh sách người dùng</a>
        <a class="nav-link submenu" th:href="@{/admin/user/add}">Tạo người dùng</a>
      </div>
      <a th:href="@{/admin/categories}"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
    </nav>

    <!-- Nội dung chính -->
    <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
      <div class="mb-3 d-flex justify-content-between align-items-center">
        <a th:href="@{/admin/movie/episode/{id}(id=${episode.product.id})}" class="btn btn-secondary">← Quay lại</a>
        <button class="btn btn-primary" type="submit" form="episodeForm">Cập nhật tập phim</button>
      </div>

      <div class="card">
        <div class="card-header">Thông tin tập phim - <span th:text="${episode.product.productName}"></span></div>
        <div class="card-body">
          <form id="episodeForm" th:action="@{/admin/episode/update/{id}(id=${episode.id})}" th:object="${episode}" method="post" class="row g-3" enctype="multipart/form-data">
            <div class="col-md-6">
              <label for="episode" class="form-label">Số tập</label>
              <input type="text" class="form-control" id="episode" th:field="*{episode}" required />
              <div th:if="${#fields.hasErrors('episode')}" class="text-danger">
                <span th:errors="*{episode}"></span>
              </div>
            </div>
            <div class="col-md-6">
              <label for="title" class="form-label">Tiêu đề tập</label>
              <input type="text" class="form-control" id="title" th:field="*{title}" required />
              <div th:if="${#fields.hasErrors('title')}" class="text-danger">
                <span th:errors="*{title}"></span>
              </div>
            </div>
            <div class="col-md-6">
              <label for="duration" class="form-label">Thời lượng (phút)</label>
              <input type="number" class="form-control" id="duration" th:field="*{duration}" required />
              <div th:if="${#fields.hasErrors('duration')}" class="text-danger">
                <span th:errors="*{duration}"></span>
              </div>
            </div>
            <div class="col-md-6">
              <label for="imageFile" class="form-label">Hình ảnh</label>
              <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*" />
              <img th:src="${episode.imageUrl}" alt="Hình ảnh tập phim" class="img-thumbnail mt-2" style="max-width: 100px;" />
            </div>
            <div class="col-md-6">
              <label for="videoFile" class="form-label">Video</label>
              <input type="file" class="form-control" id="videoFile" name="videoFile" accept="video/*" />
            </div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
