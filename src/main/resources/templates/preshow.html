<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Preshow - Xem trước phim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Thanh bên (Sidebar) -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <h4><span style="font-size: 0.7em">MENU</span></h4>
            </div>
            <a th:href="@{/user/home}"><i class="bi bi-house-fill"></i> Trang chủ</a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
               aria-controls="movieMenu">
                <span><i class="fas fa-film"></i> Phim</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="movieMenu">
                <a class="nav-link submenu" th:href="@{user/movie}">Danh sách phim</a>
            </div>
        </nav>

        <!-- Nội dung chính -->
        <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <a th:href="@{/}" class="btn btn-secondary">← Quay lại</a>
                <a th:href="@{/movie/show/{id}(id=${product.id})}" class="btn btn-success">Xem phim ngay</a>
            </div>

            <!-- Thông tin phim -->
            <div class="container">
                <div class="movie-details">
                    <h2 th:text="${product.productName}">Tên phim</h2>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div class="row">
                        <div class="col-md-4">
                            <img th:src="${product.imageUrl != null ? product.imageUrl : '/Uploads/default.png'}"
                                 alt="Poster phim" class="img-fluid" style="max-width: 100%;" />
                        </div>
                        <div class="col-md-8">
                            <p><strong>Mô tả:</strong> <span th:text="${product.description}">Không có mô tả</span></p>
                            <p><strong>Đạo diễn:</strong> <span th:text="${product.director != null ? product.director : 'Chưa có thông tin'}"></span></p>
                            <p><strong>Diễn viên:</strong> <span th:text="${product.actor != null ? product.actor : 'Chưa có thông tin'}"></span></p>
                            <p><strong>Thời lượng:</strong> <span th:text="${product.duration != null ? product.duration : 'Chưa có thông tin'}"></span></p>
                            <p><strong>Tập phim:</strong> <span th:text="${product.episode != null ? product.episode : 'Chưa có thông tin'}"></span></p>
                        </div>
                    </div>
                </div>

                <!-- Bình luận -->
                <div class="comments-section mt-5">
                    <h4>Bình luận về phim</h4>
                    <div th:if="${comments == null or comments.isEmpty()}">
                        <p>Chưa có bình luận nào về phim này.</p>
                    </div>
                    <div th:unless="${comments == null or comments.isEmpty()}">
                        <div class="comment" th:each="comment : ${comments}">
                            <div class="card mb-3">
                                <div class="card-body">
                                    <h6 class="card-subtitle mb-2 text-muted">
                                        <span th:text="${comment.user != null ? comment.user.username : 'Người dùng ẩn danh'}"></span>
                                        <span th:text="${comment.createdAt != null ? comment.createdAt : ''}"></span>
                                    </h6>
                                    <p class="card-text" th:text="${comment.content}">Nội dung bình luận</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
