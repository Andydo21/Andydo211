<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin - Danh sách người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <h4><span style="font-size: 0.7em">ADMIN</span></h4>
            </div>
            <a th:href="@{/admin/home}"><i class="bi bi-clipboard-data-fill"></i> Bảng điều khiển</a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
               aria-controls="movieMenu">
                <span><i class="fas fa-film"></i> Phim</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="movieMenu">
                <a class="nav-link submenu" th:href="@{/admin/movie}">Danh sách phim</a>
                <a class="nav-link submenu" th:href="@{/admin/movie/add}">Thêm phim</a>
                <a class="nav-link submenu" th:href="@{/admin/movie/update}">Cập nhật phim</a>
            </div>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#userMenu" role="button" aria-expanded="true"
               aria-controls="userMenu">
                <span><i class="bi bi-person-fill"></i> Người dùng</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="userMenu">
                <a class="nav-link submenu active" th:href="@{/admin/user}">Danh sách người dùng</a>
                <a class="nav-link submenu" th:href="@{user/register}">Tạo người dùng</a>
            </div>
            <a th:href="@{/admin/categories}"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
        </nav>

        <!-- Nội dung chính -->
        <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
            <div class="d-flex justify-content-between mb-3">
                <h3>Danh sách người dùng</h3>
                <a th:href="@{/admin/user/add}" class="btn btn-primary">+ Tạo người dùng</a>
            </div>
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Avatar</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td>
                        <div class="rounded-circle bg-secondary text-white d-flex justify-content-center align-items-center"
                             style="width: 40px; height: 40px;"
                             th:text="${#strings.substring(user.fullName, 0, 1)}"></div>
                    </td>
                    <td th:text="${user.fullName}"></td>
                    <td th:text="${user.userName}"></td>
                    <td th:text="${user.phone}"></td>
                    <td>
                        <span class="badge bg-secondary" th:text="${user.role}"></span>
                    </td>
                    <td>
                            <span th:classappend="${user.active} ? 'bg-success' : 'bg-secondary'"
                                  class="badge"
                                  th:text="${user.active} ? 'Đã kích hoạt' : 'Chưa kích hoạt'"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/user/update(id=${user.id})}" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>
                        <form method="post" th:action="@{/admin/user/delete(id=${user.id})}"
                              style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa người dùng này?');">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
