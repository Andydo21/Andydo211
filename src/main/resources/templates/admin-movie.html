<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Admin - Danh sách phim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <h4><span style="font-size: 0.7em">ADMIN</span></h4>
            </div>
            <a th:href="@{/admin/home}"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
               aria-controls="movieMenu">
                <span><i class="fas fa-film"></i> Phim</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="movieMenu">
                <a class="nav-link submenu active" th:href="@{/admin/movie}">Danh sách phim</a>
                <a class="nav-link submenu" th:href="@{/admin/insertProduct}">Thêm phim</a>
            </div>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#userMenu" role="button" aria-expanded="true"
               aria-controls="userMenu">
                <span><i class="bi bi-person-fill"></i> User</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="userMenu">
                <a class="nav-link submenu" th:href="@{/admin/user}">Danh sách user</a>
                <a class="nav-link submenu" th:href="@{/admin/user/add}">Tạo user</a>
            </div>
            <a th:href="@{/admin/categories}"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Danh sách phim</h2>
                <a th:href="@{/admin/insertProduct}" class="btn btn-primary">+ Thêm phim</a>
            </div>

            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Poster</th>
                    <th>Tên phim</th>
                    <th>Thể loại</th>
                    <th>Năm</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie, loop : ${movies}">
                    <td th:text="${loop.index + 1}"></td>
                    <td><img th:src="${movie.imageUrl}" width="60" class="img-thumbnail" /></td>
                    <td th:text="${movie.productName}"></td>
                    <td th:text="${movie.categoryID}"></td>
                    <td th:text="${movie.releaseDate?.year}"></td>
                    <td>
                        <a th:href="@{/admin/updateProduct/{id}(id=${movie.id})}"
                           class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>
                        <form th:action="@{/admin/deleteProduct/{productID}(productID=${movie.id})}" method="post">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
