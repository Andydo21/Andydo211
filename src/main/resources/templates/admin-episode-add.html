<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm tập phim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
    <style>
        .sidebar {
            background-color: #f8f9fa;
            min-height: 100vh;
            padding-top: 20px;
        }
        .sidebar a {
            display: block;
            padding: 10px 15px;
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        .sidebar .submenu {
            padding-left: 30px;
        }
        .sidebar .active {
            background-color: #007bff;
            color: white;
        }
        .nav-toggle-icon {
            font-size: 0.8em;
        }
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <h4><span style="font-size: 0.7em">ADMIN</span></h4>
            </div>
            <a th:href="@{/admin/home}"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
               aria-controls="movieMenu">
                <span><i class="fas fa-film"></i> Phim</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="movieMenu">
                <a class="nav-link submenu" th:href="@{/admin/movie}">Danh sách phim</a>
                <a class="nav-link submenu active" th:href="@{/admin/insertProduct}">Thêm phim</a>
                <a class="nav-link submenu" th:href="@{/admin/updateProduct/{id}(id=${product.id})}">Cập nhật phim</a>
            </div>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#userMenu" role="button" aria-expanded="true"
               aria-controls="userMenu">
                <span><i class="bi bi-person-fill"></i> User</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="userMenu">
                <a class="nav-link submenu" th:href="@{/admin/user}">Danh sách user</a>
                <a class="nav-link submenu" th:href="@{/admin/user/add}">Tạo user</a>
            </div>
            <a th:href="@{/admin/categories}"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <a th:href="@{/admin/updateProduct/{id}(id=${product.id})}" class="btn btn-secondary">← Quay lại</a>
                <button class="btn btn-success" type="submit" form="addEpisodeForm">Lưu tập phim</button>
            </div>

            <!-- Form thêm tập phim -->
            <div class="container">
                <div class="form-container">
                    <h2>Thêm tập phim cho <span th:text="${product.productName}"></span></h2>
                    <p id="episode-error" style="color: red;" th:text="${error != null ? error : ''}"></p>
                    <form id="addEpisodeForm" th:action="@{/admin/addEpisode/{ProductID}(ProductID=${product.productID})}" th:object="${episode}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="title" class="form-label">Tiêu đề tập</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" required/>
                            <div th:if="${#fields.hasErrors('title')}" class="text-danger">
                                <span th:errors="*{title}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="episode" class="form-label">Số tập</label>
                            <input type="text" class="form-control" id="episode" th:field="*{episode}" required/>
                            <div th:if="${#fields.hasErrors('episode')}" class="text-danger">
                                <span th:errors="*{episode}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="episodeTitle" class="form-label">Tiêu đề phụ (Episode Title)</label>
                            <input type="text" class="form-control" id="episodeTitle" th:field="*{episodeTitle}"/>
                            <div th:if="${#fields.hasErrors('episodeTitle')}" class="text-danger">
                                <span th:errors="*{episodeTitle}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="duration" class="form-label">Thời lượng</label>
                            <input type="text" class="form-control" id="duration" th:field="*{duration}"/>
                        </div>
                        <div class="mb-3">
                            <label for="imageFile" class="form-label">Hình ảnh</label>
                            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*"/>
                        </div>
                        <div class="mb-3">
                            <label for="videoFile" class="form-label">Video tập</label>
                            <input type="file" class="form-control" id="videoFile" name="videoFile" accept="video/*"/>
                        </div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <button type="submit" class="btn btn-primary">Lưu tập phim</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
