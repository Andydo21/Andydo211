<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin - Tạo người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <h4><span style="font-size: 0.7em">ADMIN</span></h4>
            </div>
            <a th:href="@{/admin/home}"><i class="bi bi-clipboard-data-fill"></i> Bảng điều khiển</a>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#movieMenu" role="button" aria-expanded="true"
               aria-controls="movieMenu">
                <span><i class="fas fa-film"></i> Phim</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="movieMenu">
                <a class="nav-link submenu" th:href="@{/admin/movie}">Danh sách phim</a>
                <a class="nav-link submenu" th:href="@{/admin/movie/add}">Thêm phim</a>
                <a class="nav-link submenu" th:href="@{/admin/movie/update}">Cập nhật phim</a>
            </div>
            <a class="nav-link d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#userMenu" role="button" aria-expanded="true"
               aria-controls="userMenu">
                <span><i class="bi bi-person-fill"></i> Người dùng</span>
                <i class="fas fa-chevron-down nav-toggle-icon"></i>
            </a>
            <div class="collapse show" id="userMenu">
                <a class="nav-link submenu" th:href="@{/admin/user}">Danh sách người dùng</a>
                <a class="nav-link submenu active" th:href="@{/admin/user/add}">Tạo người dùng</a>
            </div>
            <a th:href="@{/admin/categories}"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
        </nav>

        <!-- Nội dung chính -->
        <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <a th:href="@{/admin/user}" class="btn btn-secondary">← Quay lại</a>
                <button class="btn btn-primary" type="submit" form="userForm">Tạo người dùng</button>
            </div>

            <div class="card">
                <div class="card-header">Thông tin người dùng</div>
                <div class="card-body">
                    <form id="userForm" th:action="@{/admin/user/save}" th:object="${user}" method="post" class="row g-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required />
                            <div th:if="${#fields.hasErrors('username')}" class="text-danger">
                                <span th:errors="*{username}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required />
                            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                                <span th:errors="*{email}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required />
                            <div th:if="${error != null && error.contains('password')}" class="text-danger">
                                <span th:text="${error}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="telephone" class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" id="telephone" th:field="*{telephone}" required />
                            <div th:if="${#fields.hasErrors('telephone')}" class="text-danger">
                                <span th:errors="*{telephone}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="fullname" class="form-label">Họ tên</label>
                            <input type="text" class="form-control" id="fullname" th:field="*{fullname}" required />
                            <div th:if="${#fields.hasErrors('fullname')}" class="text-danger">
                                <span th:errors="*{fullname}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label">Giới tính</label>
                            <select class="form-select" id="gender" th:field="*{gender}" required>
                                <option value="true">Nam</option>
                                <option value="false">Nữ</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="birthday" class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" id="birthday" th:field="*{birthday}" required />
                            <div th:if="${#fields.hasErrors('birthday')}" class="text-danger">
                                <span th:errors="*{birthday}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="address" class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" id="address" th:field="*{address}" required />
                            <div th:if="${#fields.hasErrors('address')}" class="text-danger">
                                <span th:errors="*{address}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="enabled" class="form-label">Trạng thái</label>
                            <select class="form-select" id="enabled" th:field="*{enabled}" required>
                                <option value="true">Đã kích hoạt</option>
                                <option value="false">Chưa kích hoạt</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="role" class="form-label">Quyền</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="USER">USER</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
