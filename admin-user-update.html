<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Tạo User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="text-center mb-4">
                    <h4><span style="font-size: 0.7em">ADMIN</span></h4>
                </div>
                <a href="admin-home.html"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#movieMenu" role="button" aria-expanded="true" aria-controls="movieMenu">
                    <span><i class="fas fa-film"></i> Phim</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="movieMenu">
                    <a class="nav-link submenu" href="admin-movie.html">Danh sách phim</a>
                    <a class="nav-link submenu" href="admin-movie-add.html">Thêm phim</a>
                    <a class="nav-link submenu" href="admin-movie-update.html">Sửa phim</a>
                </div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#userMenu" role="button" aria-expanded="true" aria-controls="userMenu">
                    <span><i class="bi bi-person-fill"></i> User</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="userMenu">
                    <a class="nav-link submenu" href="admin-user.html">Danh sách user</a>
                    <a class="nav-link submenu" href="admin-user-update.html">Tạo user</a>
                </div>
                <a href="#"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <a href="admin-user.html" class="btn btn-secondary">&larr; Quay lại</a>
                    <button class="btn btn-primary" onclick="createUser()">Tạo user</button>
                </div>

                <div class="card">
                    <div class="card-header">Thông tin user</div>
                    <div class="card-body">
                        <form class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" class="form-control" id="username" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control" id="password" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Quyền</label>
                                <select class="form-select" id="role">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get("id");

        if (userId) {
            // Sửa user - nạp dữ liệu cũ
            fetch(`http://localhost:8080/api/users/${userId}`)
                .then(res => res.json())
                .then(user => {
                    document.getElementById("username").value = user.fullName;
                    document.getElementById("email").value = user.userName;
                    document.getElementById("role").value = user.role;
                    // Nếu backend hỗ trợ, cũng có thể pre-fill mật khẩu hoặc bỏ phần này
                });
        }

        function createUser() {
            const data = {
                fullName: document.getElementById("username").value,
                userName: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value,
            };

            const method = userId ? "PUT" : "POST";
            const url = userId
                ? `http://localhost:8080/api/users/${userId}`
                : "http://localhost:8080/api/users";

            fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            })
                .then(res => {
                    if (res.ok) {
                        alert(userId ? "Cập nhật thành công" : "Tạo user thành công");
                        window.location.href = "admin-user.html";
                    } else {
                        alert("Lỗi khi gửi dữ liệu!");
                    }
                });
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
