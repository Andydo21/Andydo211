<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Cập nhật phim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!--Sidebar-->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="text-center mb-4">
                    <h4><span style="font-size: 0.7em">ADMIN</span></h4>
                </div>
                <a href="admin-home.html"><i class="bi bi-clipboard-data-fill"></i> Dashboard</a>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#movieMenu" role="button" aria-expanded="true" aria-controls="movieMenu">
                    <span><i class="fas fa-film"></i> Phim</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="movieMenu">
                    <a class="nav-link submenu" href="admin-movie.html">Danh sách phim</a>
                    <a class="nav-link submenu" href="admin-movie-add.html">Thêm phim</a>
                    <a class="nav-link submenu active" href="admin-movie-update.html">Sửa phim</a>
                </div>
                <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                    href="#userMenu" role="button" aria-expanded="true" aria-controls="userMenu">
                    <span><i class="bi bi-person-fill"></i> User</span>
                    <i class="fas fa-chevron-down nav-toggle-icon"></i>
                </a>
                <div class="collapse show" id="userMenu">
                    <a class="nav-link submenu" href="admin-user.html">Danh sách user</a>
                    <a class="nav-link submenu" href="admin-user-update.html">Tạo user</a>
                </div>
                <a href="#"><i class="bi bi-globe"></i> Thể loại & Quốc gia</a>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 mt-3">
                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <a href="admin-movie.html" class="btn btn-secondary">&larr; Quay lại</a>
                    <button class="btn btn-primary" onclick="updateMovie()">Lưu phim</button>
                </div>

                <ul class="nav nav-tabs" id="movieTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="info-tab" data-bs-toggle="tab" data-bs-target="#info"
                            type="button" role="tab">Thông tin phim</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="videos-tab" data-bs-toggle="tab" data-bs-target="#videos"
                            type="button" role="tab">Danh sách video phim</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="review-tab" data-bs-toggle="tab" data-bs-target="#review"
                            type="button" role="tab">Review</button>
                    </li>
                </ul>

                <div class="tab-content mt-3" id="movieTabContent">
                    <div class="tab-pane fade show active" id="info" role="tabpanel">
                        <form class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên phim</label>
                                <input type="text" class="form-control" id="productName" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Thể loại</label>
                                <input type="text" class="form-control" id="categoryID" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tập phim</label>
                                <input type="text" class="form-control" id="episode" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Giá (VNĐ)</label>
                                <input type="number" class="form-control" id="price" />
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Ảnh poster</label>
                                <input type="text" class="form-control" id="imageUrl" />
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Link video</label>
                                <input type="text" class="form-control" id="videoUrl" />
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="videos" role="tabpanel">
                        <table class="table table-bordered" id="videoTable">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Tên tập</th>
                                    <th>Link</th>
                                    <th>Thời lượng</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <div class="tab-pane fade" id="review" role="tabpanel">
                        <table class="table table-striped" id="reviewTable">
                            <thead>
                                <tr>
                                    <th>Người dùng</th>
                                    <th>Đánh giá</th>
                                    <th>Bình luận</th>
                                    <th>Ngày</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get("id");

        if (movieId) {
            fetch(`http://localhost:8080/api/products/${movieId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("productName").value = data.productName;
                    document.getElementById("categoryID").value = data.categoryID;
                    document.getElementById("episode").value = data.episode;
                    document.getElementById("price").value = data.price;
                    document.getElementById("description").value = data.description;
                    document.getElementById("imageUrl").value = data.imageUrl;
                    document.getElementById("videoUrl").value = data.videoUrl;

                    loadVideos(movieId);
                    loadReviews(movieId);
                });
        }

        function updateMovie() {
            const payload = {
                productName: document.getElementById("productName").value,
                categoryID: document.getElementById("categoryID").value,
                episode: document.getElementById("episode").value,
                price: parseFloat(document.getElementById("price").value),
                description: document.getElementById("description").value,
                imageUrl: document.getElementById("imageUrl").value,
                videoUrl: document.getElementById("videoUrl").value
            };

            fetch(`http://localhost:8080/api/products/${movieId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
                .then(res => {
                    if (res.ok) {
                        alert("Cập nhật phim thành công!");
                        window.location.href = "admin-movie.html";
                    } else {
                        alert("Lỗi khi cập nhật phim!");
                    }
                });
        }

        function loadVideos(id) {
            fetch(`http://localhost:8080/api/videos/product/${id}`)
                .then(res => res.json())
                .then(videos => {
                    const tbody = document.querySelector("#videoTable tbody");
                    tbody.innerHTML = "";
                    videos.forEach((v, i) => {
                        tbody.innerHTML += `<tr>
              <td>${i + 1}</td>
              <td>${v.title}</td>
              <td>${v.url}</td>
              <td>${v.duration}</td>
              <td><button class='btn btn-sm btn-danger'>Xóa</button></td>
            </tr>`;
                    });
                });
        }

        function loadReviews(id) {
            fetch(`http://localhost:8080/api/comments/product/${id}`)
                .then(res => res.json())
                .then(comments => {
                    const tbody = document.querySelector("#reviewTable tbody");
                    tbody.innerHTML = "";
                    comments.forEach(c => {
                        tbody.innerHTML += `<tr>
              <td>${c.userName}</td>
              <td><span class="badge bg-success">${c.rating}/5</span></td>
              <td>${c.content}</td>
              <td>${c.date}</td>
            </tr>`;
                    });
                });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
